<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UI System</title>

<style>

body{
    margin:0;
    background:black;
    font-family:Arial;
}

/* top display */

#display{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:120px;
    background:black;
}

#display iframe{
    width:100%;
    height:100%;
    border:none;
}


/* bottom panel */

#panel{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:120px;
    background:#000;
    border-top:2px solid gold;
    display:flex;
    justify-content:center;
    align-items:center;
}


/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(5,70px);
    gap:10px;
    border:3px solid gold;
    padding:10px;
    border-radius:20px;
}

button{
    height:50px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    font-size:16px;
}


/* hide button */

#toggleBtn{
    position:fixed;
    right:10px;
    bottom:130px;
    background:gold;
    border:none;
    padding:8px 12px;
    border-radius:10px;
}

</style>
</head>



<body>


<div id="display"></div>



<button id="toggleBtn" onclick="togglePanel()">
Hide
</button>



<div id="panel">

<div class="grid">

<button onclick="openUI('ui1.html')">1</button>
<button onclick="openUI('ui2.html')">2</button>
<button onclick="openUI('ui3.html')">3</button>
<button onclick="openUI('ui4.html')">4</button>
<button onclick="openUI('ui5.html')">5</button>

<button onclick="openUI('ui6.html')">6</button>
<button onclick="openUI('ui7.html')">7</button>
<button onclick="openUI('ui8.html')">8</button>
<button onclick="openUI('ui9.html')">9</button>
<button onclick="openUI('ui10.html')">10</button>

</div>

</div>



<script>


function openUI(page){

document.getElementById("display").innerHTML =
'<iframe src="'+page+'"></iframe>';

}


function togglePanel(){

let panel = document.getElementById("panel");
let btn = document.getElementById("toggleBtn");

if(panel.style.display=="none"){

panel.style.display="flex";
btn.innerHTML="Hide";

}else{

panel.style.display="none";
btn.innerHTML="Show";

}

}


</script>


</body>
</html>
