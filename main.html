<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple UI</title>

<style>

body{
    margin:0;
    background:black;
    font-family:Arial;
    color:white;
}

/* top display */

#display{
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    border-bottom:2px solid gold;
}

/* grid box */

.gridBox{
    padding:20px;
    display:flex;
    justify-content:center;
}

/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(5,80px);
    gap:15px;
    border:3px solid gold;
    padding:15px;
    border-radius:20px;
}

/* buttons */

button{
    height:60px;
    border-radius:15px;
    border:none;
    background:#333;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:gold;
    color:black;
}

</style>
</head>



<body>


<div id="display">
    Click a button
</div>



<div class="gridBox">

<div class="grid">

<button onclick="show(1)">1</button>
<button onclick="show(2)">2</button>
<button onclick="show(3)">3</button>
<button onclick="show(4)">4</button>
<button onclick="show(5)">5</button>

<button onclick="show(6)">6</button>
<button onclick="show(7)">7</button>
<button onclick="show(8)">8</button>
<button onclick="show(9)">9</button>
<button onclick="show(10)">10</button>

</div>

</div>



<script>

function show(num){

document.getElementById("display").innerHTML =
"Interface " + num + " opened";

}

</script>


</body>
</html>
